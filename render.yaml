services:
  - type: web
    name: voyage-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:////tmp/voyage.db
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: UNSPLASH_ACCESS_KEY
        sync: false
